version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Optional: for hot-reloading
    environment:
      - FRONTEND_URL=http://localhost:3000
